<!-- verdict 判断模块 — Claude 风格：赭石左边框 + 浮动标签 -->
{% set eyebrow = eyebrow or "核心判断" %}
{% set title = title or "" %}
{% set body = body or "" %}
{% set note = note or "" %}

<div class="wechat-pub-card block-verdict" style="
    padding: 24px 24px 24px 28px;
    background: {{ c_card_bg }};
    border: 1px solid {{ c_border }};
    border-left: 3px solid {{ c_accent }};
    border-radius: 0 {{ r_card }} {{ r_card }} 0;
    margin: 24px 0;
    position: relative;
">
    {% if eyebrow %}
    <div style="
        position: absolute;
        top: -10px;
        left: 16px;
        background: {{ c_accent }};
        color: #fff;
        font-size: 11px;
        padding: 2px 10px;
        border-radius: {{ r_pill }};
        font-weight: 600;
        letter-spacing: 0.5px;
    ">{{ eyebrow }}</div>
    {% endif %}
    <div style="margin-top: 6px;">
        {% if title %}
        <div style="
            font-size: 18px;
            font-weight: 700;
            color: {{ c_heading }};
            line-height: 1.5;
            margin-bottom: 10px;
        ">{{ title }}</div>
        {% endif %}
        {% if body %}
        <div style="
            font-size: 15px;
            color: {{ c_text }};
            line-height: 1.8;
        ">{{ body | nl2br }}</div>
        {% endif %}
        {% if note %}
        <div style="
            font-size: 12px;
            color: {{ c_muted }};
            margin-top: 14px;
            padding-top: 10px;
            border-top: 1px solid {{ c_border_light }};
        ">{{ note }}</div>
        {% endif %}
    </div>
</div>
