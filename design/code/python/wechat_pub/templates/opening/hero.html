<!-- hero 开场模块 — Claude 风格：赭石标签 + 呼吸感 -->
{% set eyebrow = eyebrow or "核心观点" %}
{% set title = title or "" %}
{% set subtitle = subtitle or "" %}

<div class="wechat-pub-card block-hero" style="
    background: {{ c_bg }};
    border: 1px solid {{ c_border }};
    border-top: 3px solid {{ c_accent }};
    border-radius: 0 0 {{ r_card }} {{ r_card }};
    padding: 36px 28px 28px;
    margin: 0 0 28px;
    text-align: left;
">
    <div style="
        display: inline-block;
        color: {{ c_accent }};
        font-size: 12px;
        font-weight: 600;
        padding: 0 0 6px;
        letter-spacing: 0.5px;
        border-bottom: 2px solid {{ c_accent_light }};
        margin-bottom: 18px;
    ">{{ eyebrow }}</div>
    <h1 style="
        font-size: {{ f_h1 }};
        font-weight: 700;
        color: {{ c_heading }};
        line-height: 1.45;
        margin: 0 0 10px;
        letter-spacing: -0.01em;
    ">{{ title }}</h1>
    {% if subtitle %}
    <p style="
        font-size: 15px;
        color: {{ c_muted }};
        line-height: 1.7;
        margin: 0;
    ">{{ subtitle }}</p>
    {% endif %}
</div>
