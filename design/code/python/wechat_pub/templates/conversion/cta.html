<!-- cta 行动号召模块 — Claude 风格：轻量卡片 + 赭石点缀 -->
{% set title = title or "开始行动" %}
{% set button_text = button_text or "了解更多" %}
{% set button_url = button_url or "#" %}

<table style="width:100%;border-collapse:collapse;margin:32px 0;" cellpadding="0" cellspacing="0">
<tr><td style="
    background:#FEFCF9;
    border:1px solid {{ c_border_light }};
    border-radius: {{ r_card }};
    padding: 28px 24px;
    text-align: center;
">
    <div style="
        color: {{ c_heading }};
        font-size: 17px;
        font-weight: 600;
        line-height: 1.6;
        margin-bottom: 20px;
        letter-spacing: 0.02em;
    ">{{ title }}</div>
    <div style="
        display: inline-block;
        background: {{ c_accent }};
        color: #fff;
        font-size: 14px;
        font-weight: 600;
        padding: 10px 32px;
        border-radius: {{ r_pill }};
        text-decoration: none;
        letter-spacing: 0.5px;
    ">{{ button_text }} →</div>
</td></tr>
</table>
